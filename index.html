<style>
:root{
  --bg:#0b0d12; --card:#141824; --card2:#1b2130; --text:#eef1f6; --muted:#8992a5;
  --accent:#f97316; --accent2:#22c55e; --warn:#f5a524; --danger:#f0506e; --border:#242b3a;
  --radius:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  overscroll-behavior:none; -webkit-user-select:none; user-select:none;
}
#app{display:flex; flex-direction:column; height:100vh; height:100dvh;}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 12px 18px;
  background:linear-gradient(180deg,#11141d,#0b0d12);
  border-bottom:1px solid var(--border); flex:0 0 auto;
}
.brand{font-size:20px; font-weight:800; letter-spacing:0.3px;}
.streak-pill{
  background:var(--card2); border:1px solid var(--border); border-radius:999px;
  padding:6px 12px; font-size:14px; font-weight:700; display:flex; align-items:center; gap:5px; color:var(--accent);
}
.streak-pill .streak-label{color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
main{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px 90px 16px;}
.view{display:none;}
.view.active{display:block; animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
h1.page-title{font-size:22px; margin:2px 0 4px 0;}
p.page-sub{color:var(--muted); font-size:14px; margin:0 0 18px 0; line-height:1.4;}
.card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:14px; box-shadow:0 10px 24px -18px rgba(0,0,0,.6);
}
.card h3{margin:0 0 10px 0; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:700;}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.big-stat{font-size:30px; font-weight:800;}
.small-muted{color:var(--muted); font-size:13px;}
.btn{
  background:var(--accent); color:#04222a; border:none; border-radius:12px;
  padding:13px 16px; font-weight:700; font-size:15px; width:100%; cursor:pointer; transition:transform .1s ease;
}
.btn:active{transform:scale(.97);}
.btn.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border);}
.btn.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
.btn.small{width:auto; padding:9px 14px; font-size:13px; border-radius:10px;}
.link-btn{background:none; border:none; color:var(--muted); font-size:12.5px; font-weight:700; padding:6px 0; cursor:pointer; text-decoration:underline; text-underline-offset:2px;}
.pill-group{display:flex; gap:8px;}
.pill-group .pill{
  flex:1; text-align:center; padding:12px 8px; border-radius:12px; background:var(--card2);
  border:1px solid var(--border); font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); transition:transform .1s ease;
}
.pill-group .pill:active{transform:scale(.96);}
.pill-group .pill.active{background:rgba(249,115,22,.14); border-color:var(--accent); color:var(--accent);}

/* Date strip */
.date-strip{
  display:flex; gap:8px; overflow-x:auto; padding:2px 2px 4px 2px; margin:0 -2px 16px -2px;
  scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.date-strip::-webkit-scrollbar{display:none;}
.date-pill{
  scroll-snap-align:center; flex:0 0 auto; width:50px; padding:9px 0 8px 0; border-radius:14px;
  background:var(--card); border:1px solid var(--border); text-align:center; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:5px; transition:transform .1s ease;
}
.date-pill:active{transform:scale(.94);}
.date-pill .dow{font-size:10px; font-weight:800; letter-spacing:.05em; color:var(--muted); text-transform:uppercase;}
.date-pill .dnum{font-size:17px; font-weight:800; color:var(--text);}
.date-pill .mark{width:6px; height:6px; border-radius:50%; background:transparent;}
.date-pill.scheduled .mark{background:var(--accent);}
.date-pill.done .mark{background:var(--accent2);}
.date-pill.rest .dnum{color:var(--muted);}
.date-pill.today{box-shadow:inset 0 0 0 1.5px var(--accent);}
.date-pill.active{background:rgba(249,115,22,.18); border-color:var(--accent);}
.date-pill.active .dnum{color:var(--accent);}
.date-pill.done.active{background:rgba(34,197,94,.18); border-color:var(--accent2);}
.date-pill.done.active .dnum{color:var(--accent2);}
.date-pill.skipped .dnum{color:var(--muted); text-decoration:line-through;}
.date-pill.skipped .mark{background:var(--warn);}
.date-pill.makeup .mark{background:var(--accent2);}
.date-pill.makeup .dnum{color:var(--accent2);}

/* Progress bar */
.progress-wrap{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.progress-track{flex:1; height:7px; background:var(--card2); border-radius:99px; overflow:hidden;}
.progress-fill{height:100%; background:var(--accent2); border-radius:99px; transition:width .25s ease;}
.progress-wrap span{font-size:12.5px; color:var(--muted); font-weight:700; flex:0 0 auto; white-space:nowrap;}

.exercise{
  display:flex; align-items:flex-start; gap:12px; padding:12px 2px; border-bottom:1px solid var(--border); cursor:pointer;
}
.exercise:last-child{border-bottom:none;}
.exercise:active .chk{transform:scale(.9);}
.exercise.disabled{cursor:default;}
.exercise .chk{
  width:28px; height:28px; border-radius:9px; border:2px solid var(--border); flex:0 0 auto; margin-top:1px;
  display:flex; align-items:center; justify-content:center; font-size:16px; color:transparent; transition:all .12s ease;
}
.exercise .chk.done{background:var(--accent2); border-color:var(--accent2); color:#08210f;}
.exercise .info b{display:block; font-size:15px; transition:all .12s ease;}
.exercise .info span{color:var(--muted); font-size:13px;}
.exercise.checked .info b{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--border);}
.exercise .info{flex:1;}
.log-chip{
  flex:0 0 auto; align-self:center; padding:6px 10px; border-radius:999px; background:var(--card2);
  border:1px solid var(--border); font-size:11.5px; font-weight:800; color:var(--muted);
}
.log-chip.logged{background:rgba(249,115,22,.14); border-color:var(--accent); color:var(--accent);}
.log-form{background:var(--card2); border-radius:12px; padding:12px; margin:0 0 12px 0;}
.chip-row{display:flex; flex-wrap:wrap; gap:8px;}
.chip{
  padding:9px 13px; border-radius:999px; background:var(--card2); border:1px solid var(--border);
  font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer; transition:transform .1s ease;
}
.chip:active{transform:scale(.95);}
.chip.active{background:rgba(249,115,22,.14); border-color:var(--accent); color:var(--accent);}
select{
  width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
  padding:12px; border-radius:10px; font-size:15px; margin-top:6px; -webkit-appearance:none; appearance:none;
}
.block-label{
  display:inline-block; font-size:11px; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
  padding:3px 9px; border-radius:999px; margin:16px 0 6px 0;
}
.block-label.warmup{background:rgba(245,165,36,.15); color:var(--warn);}
.block-label.strength{background:rgba(249,115,22,.16); color:var(--accent);}
.block-label.cardio{background:rgba(240,80,110,.15); color:var(--danger);}
.block-label.flex{background:rgba(34,197,94,.15); color:var(--accent2);}
.day-card{margin-bottom:16px;}
.day-card .day-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px;}
.day-card .day-head b{font-size:16px;}
.day-card .day-head span{color:var(--muted); font-size:12px;}
input[type=text], input[type=number], input[type=date]{
  width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
  padding:12px; border-radius:10px; font-size:15px; margin-top:6px;
}
label{font-size:13px; color:var(--muted); font-weight:600;}
.field{margin-bottom:14px;}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
canvas{width:100%; display:block;}
.heatmap{display:grid; grid-template-columns:repeat(10,1fr); gap:4px;}
.heatmap .cell{aspect-ratio:1; border-radius:4px; background:var(--card2);}
.heatmap .cell.done{background:var(--accent2);}
.heatmap .cell.missed{background:rgba(240,80,110,.55);}
.heatmap .cell.skipped{background:rgba(245,165,36,.4);}
.heatmap .cell.future{background:transparent; border:1px solid var(--border);}
.weight-entry{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;}
.weight-entry:last-child{border-bottom:none;}
.weight-entry .del{color:var(--danger); font-size:18px; padding:4px 8px;}
.tip{background:rgba(249,115,22,.09); border:1px solid rgba(249,115,22,.28); border-radius:12px; padding:12px 14px; font-size:13px; color:#ffd9b3; line-height:1.5; margin-bottom:14px;}
.tabbar{
  position:fixed; bottom:0; left:0; right:0; display:flex; background:#11141d;
  border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); z-index:10;
}
.tabbar button{
  flex:1; background:none; border:none; color:var(--muted); padding:13px 4px 12px 4px;
  display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700;
}
.tabbar button.active{color:var(--accent); background:rgba(249,115,22,.08); box-shadow:inset 0 2px 0 var(--accent);}
.empty-state{text-align:center; padding:30px 10px; color:var(--muted);}
.empty-state .ico{font-size:40px; margin-bottom:8px;}
.badge{display:inline-block; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:3px 8px; font-size:11px; color:var(--muted); margin-left:6px;}
.progress-ring-wrap{display:flex; align-items:center; gap:16px;}
.checklist-btn{margin-top:14px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">Forge</div>
    <div class="streak-pill" id="streakPill"><span class="streak-label">Streak</span> 0</div>
  </div>

  <main id="views">
    <section id="view-workout" class="view active"></section>
    <section id="view-schedule" class="view"></section>
    <section id="view-weight" class="view"></section>
    <section id="view-progress" class="view"></section>
    <section id="view-profile" class="view"></section>
  </main>

  <nav class="tabbar">
    <button data-view="workout" class="active"><span>Workout</span></button>
    <button data-view="schedule"><span>Plan</span></button>
    <button data-view="weight"><span>Weight</span></button>
    <button data-view="progress"><span>Progress</span></button>
    <button data-view="profile"><span>Profile</span></button>
  </nav>
</div>

<script>
window.addEventListener('error', function(e){
  var m = document.getElementById('views');
  if(m && !m.getAttribute('data-error-shown')){
    m.setAttribute('data-error-shown','1');
    m.innerHTML = '<div style="padding:24px 18px; color:#f0506e; font-family:-apple-system,sans-serif;">'+
      '<h2 style="margin:0 0 10px 0;">Something went wrong</h2>'+
      '<p style="color:#eef1f6; font-size:14px; line-height:1.5;">The app hit an error and could not load. Screenshot this and send it back:</p>'+
      '<pre style="white-space:pre-wrap; background:#141824; padding:12px; border-radius:10px; font-size:12px; color:#eef1f6; overflow:auto;">'+
      (e && e.message ? e.message : 'Unknown error') + (e && e.filename ? ('\n'+e.filename+':'+e.lineno) : '') +
      '</pre></div>';
  }
});
(function(){
"use strict";

/* ---------------------------------------------------------------------
   DATA MODEL
--------------------------------------------------------------------- */
var KEYS = { profile:'ir_profile_v1', phase:'ir_phase_v1', workouts:'ir_workouts_v1', weights:'ir_weights_v1', strengthLogs:'ir_strength_v1', customDays:'ir_customdays_v1', makeups:'ir_makeups_v1' };

function todayStr(d){ d = d || new Date(); var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function parseDate(s){ var p=s.split('-'); return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); }
function fmtShort(s){ var d=parseDate(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

function loadJSON(key, fallback){
  try{ var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; }
}
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ /* storage unavailable — app still works, just won't persist */ } }

var defaultProfile = {
  name:'', age:32, heightCm:184, startWeight:100, goalWeight:null, startDate: todayStr(),
  lifeStage:'adult',       // 'teen' | 'adult' | 'older' | 'pregnant'
  fitnessLevel:'beginner', // 'beginner' | 'intermediate' | 'advanced'
  goal:'general',          // 'general' | 'weightloss' | 'muscle' | 'flexibility'
  equipment:'gym',         // 'gym' | 'home' | 'body'
  trainingTime:'morning',  // 'morning' | 'midday' | 'evening' | 'flexible'
  activityLevel:'desk'     // 'desk' | 'onfeet' | 'demanding'
};

var state = {
  profile: Object.assign({}, defaultProfile, loadJSON(KEYS.profile, {})),
  phase: loadJSON(KEYS.phase, 3),
  workouts: loadJSON(KEYS.workouts, {}),   // { '2026-07-09': {done, checks[], adjustment, equipOverride, skipped, health:{cal,min,hr}} }
  weights: loadJSON(KEYS.weights, [{date: todayStr(), kg: 100}]),
  strengthLogs: loadJSON(KEYS.strengthLogs, {}), // { squat: [{date, weight, reps, name}] }
  customDays: loadJSON(KEYS.customDays, {}),     // { 3:[1,3,5], 4:[...], 5:[...] } — user-chosen weekdays per phase
  makeups: loadJSON(KEYS.makeups, {})            // { '2026-07-12': {fromDate:'2026-07-10', dayIdx:2} } — skipped sessions moved here
};

function persist(){
  saveJSON(KEYS.profile, state.profile);
  saveJSON(KEYS.phase, state.phase);
  saveJSON(KEYS.workouts, state.workouts);
  saveJSON(KEYS.weights, state.weights);
  saveJSON(KEYS.strengthLogs, state.strengthLogs);
  saveJSON(KEYS.customDays, state.customDays);
  saveJSON(KEYS.makeups, state.makeups);
}

/* ---------------------------------------------------------------------
   ADAPTIVE PROGRAM ENGINE
   Instead of one fixed program, sessions are generated from the profile:
   life stage (safety), fitness level (load), goal (emphasis), and
   equipment (exercise picks). weekday patterns stay fixed per day-count.
--------------------------------------------------------------------- */
function ex(name, detail, note, slot){ return {name:name, detail:detail, note:note||'', slot:slot||null}; }

var WEEKDAYS_BY_PHASE = { 3:[1,3,5], 4:[1,2,4,5], 5:[1,2,3,4,5] };
var WEEKDAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var EQUIP_LABELS = { gym:'Full Gym', home:'Home (dumbbells/bands)', body:'Bodyweight Only' };

// Movement catalog: one canonical "slot" key per movement pattern, with a
// name for each equipment mode. Progress logging is tracked by slot key
// so it stays consistent even if the exercise name changes day to day.
var MOVES = {
  squat:        { label:'Squat',           gym:'Barbell Back Squat',              home:'Dumbbell Goblet Squat',                       body:'Bodyweight Squat' },
  hinge:        { label:'Hip Hinge',        gym:'Barbell Deadlift',                home:'Dumbbell Romanian Deadlift',                  body:'Glute Bridge' },
  lunge:        { label:'Lunge',            gym:'Dumbbell Walking Lunge',          home:'Dumbbell Walking Lunge',                      body:'Bodyweight Walking Lunge' },
  splitSquat:   { label:'Split Squat',      gym:'Bulgarian Split Squat (bench)',   home:'Bulgarian Split Squat (chair)',               body:'Bodyweight Split Squat' },
  hipThrust:    { label:'Hip Thrust',       gym:'Barbell Hip Thrust',              home:'Dumbbell Hip Thrust',                         body:'Bodyweight Hip Thrust' },
  calf:         { label:'Calf Raise',       gym:'Standing Calf Raise (machine)',   home:'Dumbbell Calf Raise',                         body:'Bodyweight Calf Raise' },
  pressHoriz:   { label:'Horizontal Press', gym:'Barbell Bench Press',             home:'Dumbbell Floor Press',                        body:'Push-Up' },
  pressVert:    { label:'Overhead Press',   gym:'Standing Barbell Overhead Press', home:'Dumbbell Shoulder Press',                     body:'Pike Push-Up' },
  pullHoriz:    { label:'Row',              gym:'Seated Cable Row',                home:'Dumbbell Bent-Over Row',                      body:'Towel Row (door anchor)' },
  pullVert:     { label:'Pulldown',         gym:'Lat Pulldown',                    home:'Resistance Band Pulldown',                    body:'Doorframe Assisted Row' },
  armIso:       { label:'Arms',             gym:'Cable Pushdown + DB Curl (superset)', home:'DB Curl + Overhead Tricep Ext (superset)', body:'Diamond Push-Up + Chair Dip (superset)' },
  lateralRaise: { label:'Shoulders',        gym:'Dumbbell Lateral Raise',          home:'Dumbbell Lateral Raise',                      body:'Pike-to-Y Raise' },
  core:         { label:'Core',             gym:'Cable Woodchopper',               home:'Dumbbell Russian Twist',                      body:'Bicycle Crunch' },
  plank:        { label:'Plank',            gym:'Plank',                           home:'Plank',                                       body:'Plank' }
};

var CARDIO = {
  gym:  [ {name:'Treadmill Steady Walk', impact:1}, {name:'Treadmill Incline Walk', impact:1}, {name:'Treadmill Intervals', impact:2}, {name:'Treadmill Sprint Intervals', impact:3} ],
  home: [ {name:'Brisk Walk / March in Place', impact:1}, {name:'Step-Ups on Stair', impact:2}, {name:'Jumping Jack Intervals', impact:3} ],
  body: [ {name:'Brisk Outdoor Walk', impact:1}, {name:'Bodyweight Cardio Circuit', impact:2}, {name:'High-Knee / Jump Intervals', impact:3} ]
};

var FLEX_POOL = ['Hip flexor stretch','Hamstring stretch','Cat-Cow','Doorway chest stretch','Seated spinal twist','Quad stretch','Ankle circles','Shoulder cross-body stretch',"Child's pose",'Lat stretch','Calf stretch','Neck rolls'];
var WARMUP_POOL = ['Arm circles','Leg swings','Bodyweight squats (easy pace)','Glute bridges','Hip circles','Cat-Cow','Band/arm pull-aparts','Thoracic rotations','Ankle circles','March in place'];

var LEVEL_SETSREPS = {
  beginner:     { main:'3 x 8-10, light-moderate load', accessory:'2 x 10-12', core:'2 x 20-30 sec' },
  intermediate: { main:'4 x 8', accessory:'3 x 10', core:'3 x 30-40 sec' },
  advanced:     { main:'4-5 x 6-8, push load once form is solid', accessory:'3 x 12', core:'3 x 45-60 sec' }
};
function setsReps(level, tier){ var lvl = LEVEL_SETSREPS[level] || LEVEL_SETSREPS.beginner; return lvl[tier] || lvl.accessory; }

// Older adults default to the gentlest scheme regardless of self-rated level (safety-first).
// Teens are capped below "advanced" — technique over max loads.
function effectiveLevel(profile){
  if(profile.lifeStage==='older') return 'beginner';
  if(profile.lifeStage==='teen') return profile.fitnessLevel==='advanced' ? 'intermediate' : profile.fitnessLevel;
  return profile.fitnessLevel;
}

function maxImpactFor(profile){
  if(profile.lifeStage==='pregnant') return 1;
  if(profile.lifeStage==='older') return 1;
  if(profile.goal==='flexibility') return 1;
  if(profile.lifeStage==='teen') return 2;
  return 3;
}

function pickCardio(profile, tier){
  var pool = CARDIO[profile.equipment] || CARDIO.gym;
  var cap = maxImpactFor(profile);
  var eligible = pool.filter(function(c){ return c.impact <= cap; });
  if(!eligible.length) eligible = [pool[0]];
  var idx = tier==='high' ? eligible.length-1 : (tier==='mid' ? Math.min(1, eligible.length-1) : 0);
  return eligible[idx];
}

var GOALS = {
  general:     { label:'General Fitness & Stay Active', cardioMin:10, cardioTier:'mid',  flexMin:6 },
  weightloss:  { label:'Lose Weight',                    cardioMin:14, cardioTier:'high', flexMin:6 },
  muscle:      { label:'Build Muscle',                   cardioMin:8,  cardioTier:'low',  flexMin:5 },
  flexibility: { label:'Flexibility & Mobility',          cardioMin:6,  cardioTier:'low',  flexMin:12 }
};

var ARCHETYPES = {
  fullA:         { title:'Full Body A', focus:'Squat & Push',            slots:[['squat','main'],['pressHoriz','main'],['pullHoriz','accessory'],['core','core']] },
  fullB:         { title:'Full Body B', focus:'Hinge & Pull',            slots:[['hinge','main'],['pullVert','main'],['lunge','accessory'],['pressVert','accessory']] },
  fullC:         { title:'Full Body C', focus:'Conditioning',            slots:[['squat','accessory'],['pressHoriz','accessory'],['pullVert','accessory'],['armIso','accessory']], extraCardio:true, extraFlex:true },
  lower:         { title:'Lower Body',  focus:'Strength',                slots:[['squat','main'],['hinge','accessory'],['lunge','accessory'],['calf','accessory'],['core','core']] },
  upper:         { title:'Upper Body',  focus:'Strength',                slots:[['pressHoriz','main'],['pullHoriz','accessory'],['pressVert','accessory'],['pullVert','accessory']] },
  lowerCond:     { title:'Lower Body',  focus:'Strength + Conditioning', slots:[['hinge','main'],['squat','accessory'],['splitSquat','accessory'],['plank','core']], extraCardio:true },
  upperFlex:     { title:'Upper Body',  focus:'Strength + Flexibility',  slots:[['pressHoriz','accessory'],['pullVert','accessory'],['pressVert','accessory'],['lateralRaise','accessory']], extraFlex:true },
  push:          { title:'Push',        focus:'Chest, Shoulders, Triceps', slots:[['pressHoriz','main'],['pressVert','main'],['lateralRaise','accessory'],['armIso','accessory']] },
  pull:          { title:'Pull',        focus:'Back, Biceps',            slots:[['hinge','main'],['pullVert','main'],['pullHoriz','accessory'],['armIso','accessory']] },
  legs:          { title:'Legs',        focus:'Squat & Hinge',           slots:[['squat','main'],['hinge','accessory'],['lunge','accessory'],['calf','accessory'],['plank','core']] },
  upperHyp:      { title:'Upper Hypertrophy', focus:'+ Core',            slots:[['pressHoriz','accessory'],['pullHoriz','accessory'],['pressVert','accessory'],['armIso','accessory'],['core','core']], extraCardio:true },
  lowerCondFlex: { title:'Lower + Conditioning', focus:'+ Flexibility',  slots:[['squat','accessory'],['splitSquat','accessory'],['hipThrust','accessory']], extraCardio:true, extraFlex:true }
};
var ARCHETYPE_KEYS = Object.keys(ARCHETYPES);
var DAY_SHAPES = { 3:['fullA','fullB','fullC'], 4:['lower','upper','lowerCond','upperFlex'], 5:['push','pull','legs','upperHyp','lowerCondFlex'] };

function buildStrengthItem(slot, profile){
  var key = slot[0], tier = slot[1];
  var move = MOVES[key];
  var name = move[profile.equipment] || move.gym;
  var detail = setsReps(effectiveLevel(profile), tier);
  return ex(name, detail, '', key);
}

function buildDay(shapeKey, profile){
  var arch = ARCHETYPES[shapeKey];
  var goal = GOALS[profile.goal] || GOALS.general;
  var cap = maxImpactFor(profile);
  var shapeIdx = ARCHETYPE_KEYS.indexOf(shapeKey);

  var warm = [0,1,2,3].map(function(i){ return ex(WARMUP_POOL[(shapeIdx+i) % WARMUP_POOL.length], ''); });
  var strengthItems = arch.slots.map(function(s){ return buildStrengthItem(s, profile); });

  var blocks = [
    {type:'warmup', label:'Warm-up · 5 min', items: warm},
    {type:'strength', label:'Strength · '+(arch.slots.length>=5?'30-35':'20-25')+' min', items: strengthItems}
  ];

  if(cap >= 1){
    var cMin = goal.cardioMin + (arch.extraCardio ? 4 : 0);
    var cEx = pickCardio(profile, goal.cardioTier);
    var cDetail = cEx.impact>=3 ? '30 sec effort / 90 sec easy x '+Math.max(4,Math.round(cMin/2))
                : cEx.impact===2 ? 'Steady intervals, '+cMin+' min total'
                : cMin+' min, easy conversational pace';
    blocks.push({type:'cardio', label:(cEx.impact>=3?'HIIT Finisher':'Cardio')+' · '+cMin+' min', items:[ex(cEx.name, cDetail)]});
  }

  var fMin = goal.flexMin + (arch.extraFlex ? 5 : 0);
  var flexCount = Math.max(3, Math.round(fMin/2.5));
  var flexItems = [];
  for(var i=0;i<flexCount;i++){ flexItems.push(ex(FLEX_POOL[(shapeIdx+i) % FLEX_POOL.length], '30-45 sec')); }
  blocks.push({type:'flex', label:(arch.extraFlex?'Extended Flexibility Flow':'Cooldown Stretch')+' · '+fMin+' min', items: flexItems});

  return { title: arch.title, focus: arch.focus, blocks: blocks };
}

// Pregnancy uses a separate, fixed, conservative template rather than the
// generated engine — safety over variety. Cycles through 3 gentle sessions
// regardless of day-count. Always requires a doctor's clearance (see safetyNote()).
var PREGNANCY_DAYS = [
  { title:'Gentle Full Body A', focus:'Light strength + walk', blocks:[
    {type:'warmup', label:'Warm-up · 5 min', items:[ex('Ankle circles',''), ex('Arm circles, easy pace',''), ex('Standing Cat-Cow','')]},
    {type:'strength', label:'Light Strength · 15-20 min', items:[
      ex('Squat to Chair (bodyweight or light dumbbell)','2 x 10-12, controlled','','squat'),
      ex('Standing Row (band or light dumbbell)','2 x 12','','pullHoriz'),
      ex('Wall or Incline Push-Up','2 x 10','','pressHoriz'),
      ex('Standing Pelvic Tilts','2 x 10, slow and controlled')
    ]},
    {type:'cardio', label:'Cardio · 10-15 min', items:[ex('Brisk Walk','Comfortable pace — should be able to hold a conversation')]},
    {type:'flex', label:'Stretch · 10 min', items:[ex('Seated side stretch','30 sec/side'), ex('Gentle neck rolls','30 sec'), ex('Ankle circles','30 sec')]}
  ]},
  { title:'Gentle Full Body B', focus:'Light strength + walk', blocks:[
    {type:'warmup', label:'Warm-up · 5 min', items:[ex('Shoulder rolls',''), ex('Marching in place, easy pace',''), ex('Standing hip circles','')]},
    {type:'strength', label:'Light Strength · 15-20 min', items:[
      ex('Standing Side Leg Raise','2 x 10/side','','lunge'),
      ex('Seated Overhead Press (light dumbbell or band)','2 x 12','','pressVert'),
      ex('Standing Wall Sit (short hold)','2 x 15-20 sec','','splitSquat'),
      ex('Kegel / pelvic floor engagement','2 x 10, slow squeeze and release')
    ]},
    {type:'cardio', label:'Cardio · 10-15 min', items:[ex('Brisk Walk or Upright Stationary Bike','Comfortable, conversational pace')]},
    {type:'flex', label:'Stretch · 10 min', items:[ex('Cat-Cow (comfortable range)','30 sec'), ex('Seated forward reach','30 sec'), ex('Chest opener stretch','30 sec')]}
  ]},
  { title:'Gentle Full Body C', focus:'Mobility + walk', blocks:[
    {type:'warmup', label:'Warm-up · 5 min', items:[ex('Standing side bends',''), ex('Wrist and ankle circles','')]},
    {type:'strength', label:'Light Strength · 10-15 min', items:[
      ex('Standing Bicep Curl (light dumbbell or band)','2 x 12','','armIso'),
      ex('Standing Calf Raise','2 x 15','','calf'),
      ex('Standing Pelvic Tilts','2 x 10')
    ]},
    {type:'cardio', label:'Cardio · 15-20 min', items:[ex('Brisk Walk','Comfortable pace, longer session')]},
    {type:'flex', label:'Prenatal Stretch Flow · 12 min', items:[ex('Seated butterfly stretch','45 sec'), ex('Gentle hip circles','45 sec'), ex('Deep breathing + relaxation','2 min')]}
  ]}
];

function programBlurb(profile){
  if(profile.lifeStage==='pregnant') return 'Gentle, doctor-cleared activity focused on staying comfortably active. Stop if you feel pain, dizziness, or shortness of breath.';
  var g = GOALS[profile.goal] || GOALS.general;
  var pieces = [g.label+' · '+EQUIP_LABELS[profile.equipment]+'.'];
  if(profile.lifeStage==='teen') pieces.push('Built around technique over heavy loads.');
  if(profile.lifeStage==='older') pieces.push('Low-impact and joint-friendly by default.');
  return pieces.join(' ');
}

function buildProgram(profile, phase){
  var shapes = DAY_SHAPES[phase];
  var days = (profile.lifeStage==='pregnant')
    ? shapes.map(function(_, i){ return PREGNANCY_DAYS[i % PREGNANCY_DAYS.length]; })
    : shapes.map(function(shapeKey){ return buildDay(shapeKey, profile); });
  var goalLabel = profile.lifeStage==='pregnant' ? 'Pregnancy-Safe' : (GOALS[profile.goal]||GOALS.general).label;
  return { label: phase+'-Day · '+goalLabel, weekdays: getTrainingDays(phase), blurb: programBlurb(profile), days: days };
}

function safetyNote(profile){
  if(profile.lifeStage==='pregnant') return "Only continue exercise during pregnancy with your doctor's clearance. Avoid lying flat on your back after the first trimester, avoid contact or fall-risk moves, and stop immediately if you feel dizzy, short of breath, or notice pain or bleeding.";
  if(profile.lifeStage==='older') return 'Move at a pace that feels controlled. Skip anything that causes pain, and check with a doctor before starting if you have a heart, joint, or balance condition.';
  if(profile.lifeStage==='teen') return 'Focus on good form over heavy weight. Having an adult or coach nearby for the first few sessions is a good idea.';
  return null;
}

/* ---------------------------------------------------------------------
   PER-DAY ADJUSTMENTS: Sore/Easy, More Cardio, More Weights, Standard
--------------------------------------------------------------------- */
function applyAdjustment(day, adjustment){
  if(!adjustment || adjustment==='standard') return day;
  var blocks = day.blocks.map(function(b){ return {type:b.type, label:b.label, items:b.items.slice()}; });

  if(adjustment==='sore'){
    blocks = blocks.filter(function(b){ return b.type!=='cardio'; }).map(function(b){
      if(b.type==='strength'){
        var trimmed = b.items.slice(0, Math.max(2, b.items.length-1));
        return {type:'strength', label:'Light Strength (easy day)', items: trimmed.map(function(it){ return ex(it.name, '2 sets, light weight — stop if anything hurts', it.note, it.slot); })};
      }
      if(b.type==='flex'){ return {type:'flex', label:'Extra Recovery Stretch', items: b.items.concat([ex('Extra gentle stretch for whatever feels tight','1-2 min')])}; }
      return b;
    });
  } else if(adjustment==='cardio'){
    var hasCardio = blocks.some(function(b){ return b.type==='cardio'; });
    if(hasCardio){
      blocks = blocks.map(function(b){
        if(b.type==='cardio'){ return {type:'cardio', label:b.label+' +extra', items: b.items.concat([ex('Extra Cardio','+10 min easy-to-moderate pace')])}; }
        return b;
      });
    } else {
      var insertAt = blocks.map(function(b){return b.type;}).indexOf('flex');
      if(insertAt===-1) insertAt = blocks.length;
      blocks.splice(insertAt, 0, {type:'cardio', label:'Cardio · 10 min', items:[ex('Steady Cardio','10 min easy-to-moderate pace')]});
    }
  } else if(adjustment==='weights'){
    blocks = blocks.map(function(b){
      if(b.type==='strength'){ return {type:'strength', label:b.label+' +extra', items: b.items.concat([ex('Extra Accessory Work','2 x 12, pick a muscle group that needs more volume')])}; }
      return b;
    });
  }
  return {title: day.title, focus: day.focus, blocks: blocks};
}

/* ---------------------------------------------------------------------
   HELPERS: schedule / streak / stats
--------------------------------------------------------------------- */
// User can override which weekdays are training days for a given phase
// (must match that phase's day-count to take effect); otherwise falls
// back to the default Mon/Wed/Fri-style pattern.
function getTrainingDays(phase){
  var custom = state.customDays && state.customDays[phase];
  return (custom && custom.length === phase) ? custom : WEEKDAYS_BY_PHASE[phase];
}

function isScheduled(dateStr, phase){
  var d = parseDate(dateStr);
  return getTrainingDays(phase).indexOf(d.getDay()) !== -1;
}

function scheduledDayIndex(dateStr, phase){
  var d = parseDate(dateStr);
  return getTrainingDays(phase).indexOf(d.getDay());
}

// A date "counts" toward streaks/progress if it's a normal training day
// that wasn't skipped, OR a rest day hosting a skipped session's makeup.
function isEffectivelyScheduled(dateStr){
  var normally = isScheduled(dateStr, state.phase);
  var log = state.workouts[dateStr];
  if(normally && log && log.skipped) return false;
  if(normally) return true;
  return !!(state.makeups && state.makeups[dateStr]);
}

function findMakeupFrom(dateStr){
  if(!state.makeups) return null;
  for(var k in state.makeups){ if(state.makeups[k].fromDate === dateStr) return k; }
  return null;
}

// Marks a scheduled day as skipped and moves its session to the next
// upcoming date that's normally a rest day and doesn't already host a makeup.
function skipDay(dateStr){
  var idx = scheduledDayIndex(dateStr, state.phase);
  if(idx === -1) return null;
  var log = state.workouts[dateStr] || {done:false, checks:[]};
  log.skipped = true;
  state.workouts[dateStr] = log;
  var cur = parseDate(dateStr);
  for(var i=0;i<60;i++){
    cur.setDate(cur.getDate()+1);
    var ds = todayStr(cur);
    if(!isScheduled(ds, state.phase) && !(state.makeups && state.makeups[ds])){
      if(!state.makeups) state.makeups = {};
      state.makeups[ds] = { fromDate: dateStr, dayIdx: idx };
      return ds;
    }
  }
  return null;
}

function unskipDay(dateStr){
  var log = state.workouts[dateStr];
  if(log){ log.skipped = false; }
  var target = findMakeupFrom(dateStr);
  if(target && state.makeups){ delete state.makeups[target]; }
}

function getDayInfo(dateStr){
  var d = parseDate(dateStr);
  var wd = d.getDay();
  var idx = getTrainingDays(state.phase).indexOf(wd);
  var log = state.workouts[dateStr];
  var prog = buildProgram(state.profile, state.phase);
  if(idx !== -1 && !(log && log.skipped)){
    return { dayIdx: idx, day: prog.days[idx], date: dateStr, programLabel: prog.label, isMakeup:false };
  }
  var makeup = state.makeups && state.makeups[dateStr];
  if(makeup){
    return { dayIdx: makeup.dayIdx, day: prog.days[makeup.dayIdx], date: dateStr, programLabel: prog.label, isMakeup:true, makeupFrom: makeup.fromDate };
  }
  return null;
}

function getEffectiveDay(dateStr){
  var info = getDayInfo(dateStr);
  if(!info) return null;
  var log = state.workouts[dateStr];
  var pregnancy = state.profile.lifeStage === 'pregnant';
  var day = info.day;
  if(!pregnancy && log && log.equipOverride && log.equipOverride !== state.profile.equipment){
    var tempProfile = Object.assign({}, state.profile, {equipment: log.equipOverride});
    var shapeKey = DAY_SHAPES[state.phase][info.dayIdx];
    day = buildDay(shapeKey, tempProfile);
  }
  if(!pregnancy && log && log.adjustment){ day = applyAdjustment(day, log.adjustment); }
  return { dayIdx: info.dayIdx, day: day, date: dateStr, programLabel: info.programLabel, pregnancy: pregnancy, isMakeup: info.isMakeup, makeupFrom: info.makeupFrom };
}

function getTodaysLog(slot, dateStr){
  var arr = state.strengthLogs[slot];
  if(!arr) return null;
  for(var i=0;i<arr.length;i++){ if(arr[i].date===dateStr) return arr[i]; }
  return null;
}
function upsertStrengthLog(slot, dateStr, weight, reps, exerciseName){
  if(!state.strengthLogs[slot]) state.strengthLogs[slot] = [];
  var arr = state.strengthLogs[slot];
  var existing = null;
  for(var i=0;i<arr.length;i++){ if(arr[i].date===dateStr){ existing = arr[i]; break; } }
  if(existing){ existing.weight=weight; existing.reps=reps; existing.name=exerciseName; }
  else { arr.push({date:dateStr, weight:weight, reps:reps, name:exerciseName}); }
}

// build list of scheduled dates from profile.startDate through today, using CURRENT phase pattern
function scheduledDatesUpToToday(){
  var out = [];
  var start = parseDate(state.profile.startDate || todayStr());
  var end = new Date();
  end.setHours(0,0,0,0);
  var cur = new Date(start);
  cur.setHours(0,0,0,0);
  while(cur <= end){
    var ds = todayStr(cur);
    if(isEffectivelyScheduled(ds)) out.push(ds);
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

function currentStreak(){
  var dates = scheduledDatesUpToToday();
  var today = todayStr();
  var streak = 0;
  for(var i=dates.length-1;i>=0;i--){
    var ds = dates[i];
    if(ds === today){
      // don't break streak on today if not yet done — just skip counting it
      if(state.workouts[ds] && state.workouts[ds].done) streak++;
      continue;
    }
    if(state.workouts[ds] && state.workouts[ds].done){ streak++; }
    else { break; }
  }
  return streak;
}

function totalCompleted(){
  var c = 0;
  for(var k in state.workouts){ if(state.workouts[k].done) c++; }
  return c;
}

function weekBounds(d){
  d = d || new Date();
  var day = d.getDay();
  var diffToMon = (day === 0 ? -6 : 1 - day);
  var mon = new Date(d); mon.setDate(d.getDate()+diffToMon); mon.setHours(0,0,0,0);
  var sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon, end:sun};
}

function weekProgress(){
  var wb = weekBounds();
  var target = getTrainingDays(state.phase).length;
  var done = 0;
  var cur = new Date(wb.start);
  var today = new Date(); today.setHours(0,0,0,0);
  while(cur <= wb.end && cur <= today){
    var ds = todayStr(cur);
    if(isEffectivelyScheduled(ds) && state.workouts[ds] && state.workouts[ds].done) done++;
    cur.setDate(cur.getDate()+1);
  }
  return {done:done, target:target};
}

function latestWeight(){
  if(!state.weights.length) return state.profile.startWeight;
  var sorted = state.weights.slice().sort(function(a,b){ return a.date < b.date ? 1 : -1; });
  return sorted[0].kg;
}

function bmi(kg, cm){
  var m = cm/100;
  return kg / (m*m);
}

/* ---------------------------------------------------------------------
   NAVIGATION
--------------------------------------------------------------------- */
var currentView = 'workout';
function switchView(name){
  currentView = name;
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-view')===name);
  });
  document.querySelector('main').scrollTop = 0;
  renderAll();
}
document.querySelectorAll('.tabbar button').forEach(function(b){
  b.addEventListener('click', function(){ switchView(b.getAttribute('data-view')); });
});

/* ---------------------------------------------------------------------
   RENDER: WORKOUT (date strip + checklist for whichever day is selected)
--------------------------------------------------------------------- */
var selectedDate = todayStr();
var openLogIdx = null; // which strength exercise's inline weight-log form is expanded
var DOW_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function dateStripRange(){
  var out = [];
  var today = new Date(); today.setHours(0,0,0,0);
  for(var i=-9;i<=9;i++){
    var d = new Date(today); d.setDate(today.getDate()+i);
    out.push(todayStr(d));
  }
  return out;
}

function relativeLabel(dateStr){
  var today = new Date(); today.setHours(0,0,0,0);
  var d = parseDate(dateStr);
  var diff = Math.round((d-today)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff===-1) return 'Yesterday';
  return null;
}

function scrollPillIntoView(pill){
  if(pill && typeof pill.scrollIntoView === 'function'){
    try{ pill.scrollIntoView({inline:'center', block:'nearest'}); }catch(e){ pill.scrollIntoView(); }
  }
}

function renderWorkout(){
  var el = document.getElementById('view-workout');
  el.innerHTML =
    '<h1 class="page-title">Workout</h1>'+
    '<div class="date-strip" id="dateStrip"></div>'+
    '<div id="workoutBody"></div>';
  buildDateStrip();
  updateWorkoutBody();
  scrollPillIntoView(el.querySelector('.date-pill.active'));
}

function buildDateStrip(){
  var strip = document.getElementById('dateStrip');
  var dates = dateStripRange();
  var html = dates.map(function(ds){
    var d = parseDate(ds);
    var normally = isScheduled(ds, state.phase);
    var log = state.workouts[ds];
    var skipped = normally && log && log.skipped;
    var isMakeup = !normally && state.makeups && !!state.makeups[ds];
    var scheduled = isEffectivelyScheduled(ds);
    var done = scheduled && log && log.done;
    var cls = ['date-pill'];
    if(!scheduled) cls.push('rest'); else cls.push('scheduled');
    if(skipped) cls.push('skipped');
    if(isMakeup) cls.push('makeup');
    if(done) cls.push('done');
    if(ds === todayStr()) cls.push('today');
    if(ds === selectedDate) cls.push('active');
    return '<div class="'+cls.join(' ')+'" data-date="'+ds+'">'+
      '<span class="dow">'+DOW_SHORT[d.getDay()]+'</span>'+
      '<span class="dnum">'+d.getDate()+'</span>'+
      '<span class="mark"></span>'+
    '</div>';
  }).join('');
  strip.innerHTML = html;

  strip.querySelectorAll('.date-pill').forEach(function(pill){
    pill.addEventListener('click', function(){
      selectedDate = pill.getAttribute('data-date');
      openLogIdx = null;
      strip.querySelectorAll('.date-pill').forEach(function(p){ p.classList.remove('active'); });
      pill.classList.add('active');
      scrollPillIntoView(pill);
      updateWorkoutBody();
    });
  });
}

function refreshStripMarks(){
  var strip = document.getElementById('dateStrip');
  if(!strip) return;
  strip.querySelectorAll('.date-pill').forEach(function(pill){
    var ds = pill.getAttribute('data-date');
    var normally = isScheduled(ds, state.phase);
    var log = state.workouts[ds];
    var skipped = normally && log && log.skipped;
    var isMakeup = !normally && state.makeups && !!state.makeups[ds];
    var scheduled = isEffectivelyScheduled(ds);
    var done = scheduled && log && log.done;
    pill.classList.toggle('scheduled', !!scheduled);
    pill.classList.toggle('rest', !scheduled);
    pill.classList.toggle('skipped', !!skipped);
    pill.classList.toggle('makeup', !!isMakeup);
    pill.classList.toggle('done', !!done);
  });
}

function inlineLogFormHtml(slot, flatIdx, wKey, exName){
  var todays = getTodaysLog(slot, wKey);
  return '<div class="log-form" data-flatidx="'+flatIdx+'">' +
    '<div class="two-col">' +
      '<div class="field"><label>Weight (kg)</label><input type="number" step="0.5" id="logW_'+flatIdx+'" value="'+(todays?todays.weight:'')+'"></div>' +
      '<div class="field"><label>Reps</label><input type="number" id="logR_'+flatIdx+'" value="'+(todays?todays.reps:'')+'"></div>' +
    '</div>' +
    '<button class="btn small" data-savelog="'+flatIdx+'" data-slot2="'+slot+'" data-exname="'+exName+'">Save</button>' +
  '</div>';
}

function updateWorkoutBody(){
  var body = document.getElementById('workoutBody');
  var effDay = getEffectiveDay(selectedDate);
  var d = parseDate(selectedDate);
  var dateLabel = d.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  var rel = relativeLabel(selectedDate);
  var today = todayStr();
  var isFuture = selectedDate > today;

  var subHtml = dateLabel + (rel ? ' <span class="badge">'+rel+'</span>' : '');

  if(!effDay){
    var normallyScheduled = isScheduled(selectedDate, state.phase);
    var todayLog = state.workouts[selectedDate];
    var wasSkipped = normallyScheduled && todayLog && todayLog.skipped;
    if(wasSkipped){
      var makeupTarget = findMakeupFrom(selectedDate);
      body.innerHTML =
        '<p class="page-sub">'+subHtml+'</p>'+
        '<div class="card">'+
          '<div class="empty-state">'+
          '<div style="font-weight:700; color:var(--text); margin-bottom:4px;">Skipped</div>'+
          '<div class="small-muted">This session was skipped'+(makeupTarget ? ' — moved to '+fmtShort(makeupTarget) : '')+'.</div></div>'+
        '</div>'+
        '<button class="link-btn" id="undoSkipBtn">Undo skip</button>';
      var undoBtn = document.getElementById('undoSkipBtn');
      if(undoBtn){
        undoBtn.addEventListener('click', function(){
          unskipDay(selectedDate);
          persist();
          updateWorkoutBody();
          updateStreakPill();
          refreshStripMarks();
        });
      }
      return;
    }
    body.innerHTML =
      '<p class="page-sub">'+subHtml+'</p>'+
      '<div class="card">'+
        '<div class="empty-state">'+
        '<div style="font-weight:700; color:var(--text); margin-bottom:4px;">Rest day</div>'+
        '<div class="small-muted">'+(isFuture ? 'Nothing scheduled — recovery.' : 'No training was scheduled this day.')+'</div></div>'+
      '</div>'+
      (selectedDate===today ? '<div class="tip"><b>Tip:</b> once 3 days a week feels manageable and you\'re recovering well, head to the <b>Plan</b> tab to add a 4th day.</div>' : '');
    return;
  }

  var wKey = selectedDate;
  var log = state.workouts[wKey] || {done:false, checks:[]};
  var flatItems = [];
  effDay.day.blocks.forEach(function(b){ b.items.forEach(function(it){ flatItems.push({item:it, blockType:b.type}); }); });
  if(!log.checks || log.checks.length !== flatItems.length){ log.checks = flatItems.map(function(){return false;}); }

  var doneCount = log.checks.filter(Boolean).length;
  var pct = Math.round((doneCount/flatItems.length)*100);
  var allDone = doneCount === flatItems.length;

  var html = '<p class="page-sub">'+subHtml+' · '+effDay.day.title+' · '+effDay.day.focus+' <span class="badge">'+effDay.programLabel+'</span></p>';

  if(effDay.isMakeup){
    html += '<div class="tip"><b>Makeup session</b> — moved here from '+fmtShort(effDay.makeupFrom)+'.</div>';
  }

  if(isFuture){
    html += '<div class="tip"><b>Preview only —</b> this unlocks for ticking off on '+dateLabel+'.</div>';
  } else if(allDone){
    html += '<div class="tip"><b>Complete.</b> Workout finished'+(selectedDate===today?' for today':'')+' — nice work.</div>';
  } else {
    html += '<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><span>'+doneCount+'/'+flatItems.length+'</span></div>';
  }

  if(!effDay.pregnancy && !effDay.isMakeup){
    html += '<button class="link-btn" id="skipDayBtn">Skip this day → move to next rest day</button>';
  }

  if(!isFuture && !effDay.pregnancy){
    var adj = (log.adjustment) || 'standard';
    var eq = log.equipOverride || state.profile.equipment;
    var adjLabels = {standard:'Standard', sore:'Sore / Easy', cardio:'More Cardio', weights:'More Weights'};
    var equipLabels = {gym:'Gym', home:'Home', body:'Bodyweight'};
    html += '<div class="card"><h3>Adjust This Session</h3><div class="chip-row">';
    ['standard','sore','cardio','weights'].forEach(function(a){
      html += '<div class="chip'+(adj===a?' active':'')+'" data-adj="'+a+'">'+adjLabels[a]+'</div>';
    });
    html += '</div><div class="chip-row" style="margin-top:8px;">';
    ['gym','home','body'].forEach(function(e2){
      html += '<div class="chip'+(eq===e2?' active':'')+'" data-equip="'+e2+'">'+equipLabels[e2]+'</div>';
    });
    html += '</div></div>';
  } else if(effDay.pregnancy){
    html += '<div class="tip" style="border-color:rgba(245,165,36,.35); background:rgba(245,165,36,.08); color:#ffe3b0;"><b>Before you start:</b> '+safetyNote(state.profile)+'</div>';
  }

  html += '<div class="card">';
  var flatIdx = 0;
  effDay.day.blocks.forEach(function(b){
    html += '<div class="block-label '+b.type+'">'+b.label+'</div>';
    b.items.forEach(function(it){
      var checked = log.checks[flatIdx];
      var showLog = (b.type==='strength' && it.slot);
      var chipHtml = '';
      if(showLog){
        var loggedToday = getTodaysLog(it.slot, wKey);
        chipHtml = '<div class="log-chip'+(loggedToday?' logged':'')+'" data-flatidx="'+flatIdx+'" data-slot="'+it.slot+'" data-exname="'+it.name+'">'+(loggedToday ? loggedToday.weight+'kg' : 'Log')+'</div>';
      }
      html += '<div class="exercise'+(isFuture?' disabled':'')+(checked?' checked':'')+'" data-idx="'+flatIdx+'">'+
        '<div class="chk'+(checked?' done':'')+'">'+(checked?'✓':'')+'</div>'+
        '<div class="info"><b>'+it.name+'</b><span>'+it.detail+'</span></div>'+
        chipHtml+
      '</div>';
      if(showLog && openLogIdx===flatIdx){ html += inlineLogFormHtml(it.slot, flatIdx, wKey, it.name); }
      flatIdx++;
    });
  });
  html += '</div>';

  if(!isFuture && doneCount > 0){
    html += '<button class="link-btn" id="resetChecksBtn">Reset checklist</button>';
  }

  if(!isFuture){
    html += '<div class="card"><h3>Session Stats (optional)</h3>'+
      '<div class="two-col">'+
        '<div class="field"><label>Calories burned</label><input type="number" id="healthCal" value="'+(log.health&&log.health.cal||'')+'"></div>'+
        '<div class="field"><label>Active minutes</label><input type="number" id="healthMin" value="'+(log.health&&log.health.min||'')+'"></div>'+
      '</div>'+
      '<div class="field"><label>Avg heart rate (bpm)</label><input type="number" id="healthHr" value="'+(log.health&&log.health.hr||'')+'"></div>'+
      '<button class="btn secondary small" id="saveHealthBtn">Save</button>'+
      '<p class="small-muted" style="margin-top:8px;">Type in numbers from Apple Health or your watch — a home-screen web app can\'t read that data automatically.</p>'+
    '</div>';
  }

  body.innerHTML = html;

  var skipBtn = document.getElementById('skipDayBtn');
  if(skipBtn){
    skipBtn.addEventListener('click', function(){
      skipDay(selectedDate);
      persist();
      updateWorkoutBody();
      updateStreakPill();
      refreshStripMarks();
    });
  }

  if(!isFuture){
    body.querySelectorAll('.exercise').forEach(function(row){
      row.addEventListener('click', function(){
        var idx = parseInt(row.getAttribute('data-idx'));
        log.checks[idx] = !log.checks[idx];
        log.done = log.checks.every(Boolean);
        state.workouts[wKey] = log;
        persist();
        updateWorkoutBody();
        updateStreakPill();
        refreshStripMarks();
      });
    });
    var resetBtn = document.getElementById('resetChecksBtn');
    if(resetBtn){
      resetBtn.addEventListener('click', function(e){
        e.stopPropagation();
        log.checks = log.checks.map(function(){return false;});
        log.done = false;
        state.workouts[wKey] = log;
        persist();
        updateWorkoutBody();
        updateStreakPill();
        refreshStripMarks();
      });
    }
    body.querySelectorAll('[data-adj]').forEach(function(c){
      c.addEventListener('click', function(){
        log.adjustment = c.getAttribute('data-adj');
        state.workouts[wKey] = log;
        persist();
        openLogIdx = null;
        updateWorkoutBody();
      });
    });
    body.querySelectorAll('[data-equip]').forEach(function(c){
      c.addEventListener('click', function(){
        var e2 = c.getAttribute('data-equip');
        log.equipOverride = (e2===state.profile.equipment) ? null : e2;

function drawLineChart(canvasId, points, unit, emptyMsg){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  var ctx = canvas.getContext && canvas.getContext('2d');
  if(!ctx) return;
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth || 300, h = 160;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  if(points.length < 2){
    ctx.fillStyle = '#8992a5';
    ctx.font = '13px -apple-system,sans-serif';
    ctx.fillText(emptyMsg || 'Log at least two entries to see your trend', 8, h/2);
    return;
  }

  var vals = points.map(function(s){return s.val;});
  var min = Math.min.apply(null, vals) - 1;
  var max = Math.max.apply(null, vals) + 1;
  if(max===min){ max += 1; min -= 1; }
  var pad = 24;
  var plotW = w - pad*1.5, plotH = h - pad*1.5;

  ctx.strokeStyle = '#242b3a';
  ctx.lineWidth = 1;
  for(var g=0; g<=3; g++){
    var y = 10 + (plotH/3)*g;
    ctx.beginPath(); ctx.moveTo(4,y); ctx.lineTo(w-4,y); ctx.stroke();
  }

  ctx.beginPath();
  points.forEach(function(s,i){
    var x = 4 + (plotW-4) * (i/(points.length-1));
    var y = 10 + plotH * (1 - (s.val-min)/(max-min));
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = 2.5;
  ctx.lineJoin='round';
  ctx.stroke();

  points.forEach(function(s,i){
    var x = 4 + (plotW-4) * (i/(points.length-1));
    var y = 10 + plotH * (1 - (s.val-min)/(max-min));
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = '#f97316'; ctx.fill();
  });

  ctx.fillStyle = '#8992a5';
  ctx.font = '11px -apple-system,sans-serif';
  ctx.fillText(max.toFixed(0)+(unit||''), 4, 12);
  ctx.fillText(min.toFixed(0)+(unit||''), 4, h-2);
}

function drawWeightChart(sorted){

function weeklyHealthTotals(){
  var wb = weekBounds();
  var cal = 0, min = 0;
  for(var ds in state.workouts){
    var d = parseDate(ds);
    if(d >= wb.start && d <= wb.end){
      var h = state.workouts[ds].health;
      if(h){ if(h.cal) cal += h.cal; if(h.min) min += h.min; }
    }
  }
  return {cal:cal, min:min};
}

function renderHeatmap(){
  var wrap = document.getElementById('heatmap');
  if(!wrap) return;
  var days = 70; // 10 weeks
  var today = new Date(); today.setHours(0,0,0,0);
  var cells = [];
  for(var i=days-1; i>=0; i--){
    var d = new Date(today); d.setDate(today.getDate()-i);
    var ds = todayStr(d);
    var normally = isScheduled(ds, state.phase);
    var log = state.workouts[ds];
    var skipped = normally && log && log.skipped;
    var scheduled = isEffectivelyScheduled(ds);
    var cls = 'cell';
    if(d > today) cls += ' future';
    else if(skipped) cls += ' skipped';
    else if(scheduled){
      if(log && log.done) cls += ' done';
      else if(d < today) cls += ' missed';
    }
    cells.push('<div class="'+cls+'" title="'+ds+'"></div>');
  }
  wrap.innerHTML = cells.join('');
}

    if(confirm('This will erase your workout log, weight history, strength logs, and profile from this device. Continue?')){
      localStorage.removeItem(KEYS.profile);
      localStorage.removeItem(KEYS.phase);
      localStorage.removeItem(KEYS.workouts);
      localStorage.removeItem(KEYS.weights);
      localStorage.removeItem(KEYS.strengthLogs);
      localStorage.removeItem(KEYS.customDays);
      localStorage.removeItem(KEYS.makeups);
      state.profile = JSON.parse(JSON.stringify(defaultProfile));
      state.phase = 3;
      state.workouts = {};
      state.weights = [{date: todayStr(), kg: 100}];
      state.strengthLogs = {};
      state.customDays = {};
      state.makeups = {};
      persist();
      renderAll();
    }
  });
}

/* ---------------------------------------------------------------------
   STREAK PILL + MASTER RENDER
--------------------------------------------------------------------- */
function updateStreakPill(){
  document.getElementById('streakPill').innerHTML = '<span class="streak-label">Streak</span> ' + currentStreak();
}

function renderAll(){
  updateStreakPill();
  if(currentView==='workout') renderWorkout();
  else if(currentView==='schedule') renderSchedule();
  else if(currentView==='weight') renderWeight();
  else if(currentView==='progress') renderProgress();
  else if(currentView==='profile') renderProfile();
}

renderAll();

})();
</script>
</body>
</html>
